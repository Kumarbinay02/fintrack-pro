<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        font-family:
          --system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      main {
        background-color: #f4f7f6;
        padding: 40px;
        height: 100%;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
          position: absolute;
      }
      form {
        width: 450px;
        background-color: #ffffff;
        min-height: 430px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        padding: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        border-radius: 15px;
      }
      .welcome-text {
        width: 115%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }
      .welcome-text h1 {
        height: 24px;
      }
      .welcome-text p {
        height: 16px;
      }
      .welcome-user {
        width: 115%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .welcome-user #last-text {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 14px;
      }
      .welcome-user p #register {
        color: blue;
        cursor: pointer;
      }
      .welcome-user input {
        padding: 10px 20px;
        border: 0.5px solid #eababa;
        border-radius: 5px;
      }
      .welcome-user button {
        padding: 13px 30px;
        border: none;
        border-radius: 5px;
        background-color: blueviolet;
        color: white;
      }
      .welcome-user button span {
        height: 20px;
      }
      #userName {
        height: 16px;
      }
      #password {
        height: 16px;
      }
      .register-form {
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* for section 1 */
      #section1{
        background-color: #f4f7f6;
        padding: 40px;
        height: 100%;
        width: 100%;
        display: none;
        justify-content: center;
        align-items: center;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
          position: relative;
      }
      .welcome-text1 {
        width: 115%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }
      .welcome-text1 h1 {
        height: 24px;
      }
      .welcome-text1 p {
        height: 16px;
      }
      .welcome-user1 {
        width: 115%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .welcome-user1 #last-text1 {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 14px;
      }
      .welcome-user1 p #register1 {
        color: blue;
        cursor: pointer;
      }
      .welcome-user1 input {
        padding: 10px 20px;
        border: 0.5px solid #eababa;
        border-radius: 5px;
      }
      .welcome-user1 button {
        padding: 13px 30px;
        border: none;
        border-radius: 5px;
        background-color: #28A745;
        color: white;
      }
      .welcome-user1 button span {
        height: 20px;
      }
      #userName1 {
        height: 16px;
      }
      #password1 {
        height: 16px;
      }
      .register-form {
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }



     
      
  </style>
</head>
<body>
  <main>
      <form>
        <div class="welcome-text">
          <h1 id="heading">Welcome Back</h1>
          <p id="subheading">Login to FinTrack Pro</p>
        </div>
        <div class="welcome-user">
          <p id="userName">Username</p>
          <input type="text" id="loginUser"/>
          <p id="password">Password</p>
          <input type="password" id="loginPasssword"/>
          <button type="submit" id="login">Login</button>
          <p id="last-text">
            <span id="account">Don't have an account?</span>
            <span id="register">Register here</span>
          </p>
        </div>
      </form>
    </main>
    <section id="section1">
      <form>
        <div class="welcome-text1">
          <h1 id="heading1">Create Account</h1>
          <p id="subheading1">Join FinTrack Pro</p>
        </div>
        <div class="welcome-user1">
          <p id="userName1">Choose a Username</p>
          <input id="User-input" type="text" required/>
          <p id="password1">Password</p>
          <input id="password-input" type="password" required/>
          <button type="button" id="login1">Register</button>
          <p id="last-text1">
            <span id="account1">Already have an account?</span>
            <span id="register1">Login here</span>
          </p>
        </div>
      </form>
    </section>

    
  <script>
    const registerHere = document.querySelector("#register");
    const loginHere = document.querySelector("#register1");
    const section1 = document.querySelector("#section1");
    const main = document.querySelector("main");
    const loginBtn = document.querySelector("#login");
    const section2 = document.querySelector("#section2")
    registerHere.addEventListener("click", () => {
       section1.style.display = "flex";
       main.style.display = "none";
    })
    loginHere.addEventListener("click", () => {
       main.style.display = "flex";
       section1.style.display = "none";
    })
    const registerBtn = document.querySelector("#login1");
   
    registerBtn.addEventListener("click", (event) => {
      event.preventDefault();
      const userName1 = document.querySelector("#User-input").value.trim();
      const password1 = document.querySelector("#password-input").value.trim();
      if(userName1 === "" || password1 === ""){
        alert("Please fill all fields");
        return;
      }
      let users = JSON.parse(localStorage.getItem("users")) || [];
      const exists = users.find(user => user.username === userName1);
      if(exists){
        alert("Username already exists");
        return;
      }
      users.push({
        username: userName1,
        password: password1
      });
      localStorage.setItem("users", JSON.stringify(users));
      main.style.display = "flex";
      section1.style.display = "none";
      storedUser = localStorage.getItem("users");
      console.log("Stored User:", storedUser);
      

    });
    loginBtn.addEventListener("click",(event) => {
      event.preventDefault();
      const username = document.querySelector("#loginUser").value.trim();
      const password = document.querySelector("#loginPasssword").value.trim();
      if(username === "" || password === ""){
        alert("Please fill all the fields");
        return;
      }
      let users = JSON.parse(localStorage.getItem("users")) || [];
      const validUser = users.find(user => 
        user.username === username && user.password === password
      );
      if(validUser){
        localStorage.setItem("currentUser", validUser.username);
        window.location.href = "main.html";
      }else{
        alert("Invalid username or password");
      };
    });
  </script>
</body>
</html>
